name: Test and Deploy

on:
  push:
    branches:
      - main
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Where is my composer.json?
        run: find . -name "composer.json"
  
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, mysql
  
      - name: Install dependencies
        working-directory: ./"Deliverable 3/Le Châteaubriand"
        run: composer install --prefer-dist --no-progress
  
      - name: Run tests
        working-directory: ./"Deliverable 3/Le Châteaubriand"
        run: vendor/bin/phpunit

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: test # Only runs if the test job succeeds

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /var/www/deploy.sh
